name: Напоминания СтройУчёт

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Проверить события и отправить напоминания
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          node -e "
          const https = require('https');
          const TG_TOKEN = process.env.TG_TOKEN;
          const TG_CHAT_ID = process.env.TG_CHAT_ID;

          function httpsGet(hostname, path) {
            return new Promise((resolve, reject) => {
              const req = https.get({ hostname, path }, (res) => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); }
                  catch(e) { reject(new Error('JSON parse: ' + data.substring(0, 200))); }
                });
              });
              req.on('error', reject);
              req.setTimeout(15000, () => { req.destroy(); reject(new Error('timeout')); });
            });
          }

          function sendTelegram(text) {
            return new Promise((resolve) => {
              const body = JSON.stringify({ chat_id: TG_CHAT_ID, text, parse_mode: 'Markdown' });
              const req = https.request({
                hostname: 'api.telegram.org',
                path: '/bot' + TG_TOKEN + '/sendMessage',
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body) }
              }, (res) => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => { console.log('TG response:', d.substring(0, 200)); resolve(); });
              });
              req.on('error', e => { console.error('TG error:', e.message); resolve(); });
              req.write(body);
              req.end();
            });
          }

          function getReminded() {
            return new Promise((resolve) => {
              https.get({
                hostname: 'firestore.googleapis.com',
                path: '/v1/projects/specsol-crm/databases/(default)/documents/crm/reminded'
              }, (res) => {
                let d = ''; res.on('data', c => d += c);
                res.on('end', () => {
                  try { const doc = JSON.parse(d); const r = {}; Object.keys(doc.fields||{}).forEach(k=>r[k]=true); resolve(r); }
                  catch(e) { resolve({}); }
                });
              }).on('error', () => resolve({}));
            });
          }

          function setReminded(key) {
            return new Promise((resolve) => {
              const body = JSON.stringify({ fields: { [key]: { booleanValue: true } } });
              const req = https.request({
                hostname: 'firestore.googleapis.com',
                path: '/v1/projects/specsol-crm/databases/(default)/documents/crm/reminded?updateMask.fieldPaths=' + encodeURIComponent(key),
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body) }
              }, () => resolve());
              req.on('error', () => resolve());
              req.write(body); req.end();
            });
          }

          async function main() {
            console.log('=== СтройУчёт Reminders', new Date().toISOString(), '===');
            console.log('TG_TOKEN set:', !!TG_TOKEN, '| TG_CHAT_ID set:', !!TG_CHAT_ID);
            if (!TG_TOKEN || !TG_CHAT_ID) { console.log('Secrets not set!'); return; }

            let doc;
            try {
              doc = await httpsGet('firestore.googleapis.com', '/v1/projects/specsol-crm/databases/(default)/documents/crm/data');
              console.log('Firebase top fields:', Object.keys(doc.fields||{}).join(', '));
            } catch(e) { console.error('Firebase error:', e.message); return; }

            const fields = doc.fields || {};
            let planItems = [];

            if (fields.plan?.arrayValue?.values) {
              planItems = fields.plan.arrayValue.values;
              console.log('plan found directly, count:', planItems.length);
            } else {
              console.log('No plan field found. Fields:', JSON.stringify(Object.keys(fields)));
              const sample = fields[Object.keys(fields)[0]];
              if (sample) console.log('Sample field structure:', JSON.stringify(sample).substring(0,300));
              return;
            }

            const now = new Date();
            const reminded = await getReminded();
            let sent = 0;

            for (const item of planItems) {
              const f = item.mapValue?.fields || {};
              const id = f.id?.stringValue;
              const title = f.title?.stringValue;
              const dt = f.dt?.stringValue;
              const time = f.time?.stringValue;
              const remind = f.remind?.stringValue || String(f.remind?.integerValue||'');
              const participants = f.participants?.stringValue || '';
              const desc = f.desc?.stringValue || '';
              const cat = f.cat?.stringValue || '';

              if (!id||!title||!dt||!time||!remind) { console.log('Skip (missing):', title||id); continue; }
              const remindMin = parseInt(remind);
              if (!remindMin) continue;

              const evDt = new Date(dt + 'T' + time);
              const diffMin = (evDt - now) / 60000;
              console.log('Event:', title, '| remind:', remindMin, '| diffMin:', diffMin.toFixed(1));

              const key = 'r_' + id + '_' + remind;
              if (diffMin <= remindMin && diffMin > remindMin - 6 && !reminded[key]) {
                console.log('SENDING:', title);
                const rl = {'5':'за 5 мин','15':'за 15 мин','30':'за 30 мин','60':'за 1 час','1440':'за 1 день'};
                const cl = {meet:'Встреча',task:'Задача',call:'Звонок',deadline:'Дедлайн',other:'Прочее'};
                let txt = '📅 *Напоминание — ' + (rl[String(remindMin)]||remindMin+' мин') + '*\n*' + title + '*\n🕐 ' + dt.split('-').reverse().join('.') + ' в ' + time.slice(0,5);
                if (cl[cat]) txt += '  ·  ' + cl[cat];
                if (participants) txt += '\n👥 ' + participants;
                if (desc) txt += '\n📝 ' + desc;
                await sendTelegram(txt);
                await setReminded(key);
                sent++;
              }
            }
            console.log('Done. Sent:', sent);
          }

          main().catch(e => { console.error('Fatal:', e.message); });
          "
